name: 🜏 Lilith CLI Android Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Dependencies
        working-directory: lilith-cli-android
        run: |
          npm ci
          npm run build

      - name: Sync Capacitor
        working-directory: lilith-cli-android
        run: |
          npx cap add android
          npx cap sync android

      - name: Build APK
        working-directory: lilith-cli-android/android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: lilith-cli-apk
          path: lilith-cli-android/android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

  build-aab:
    name: Build Android AAB (Play Store)
    runs-on: ubuntu-latest
    needs: build-apk
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Dependencies
        working-directory: lilith-cli-android
        run: |
          npm ci
          npm run build

      - name: Sync Capacitor
        working-directory: lilith-cli-android
        run: |
          npx cap add android
          npx cap sync android

      - name: Setup Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE }}" | base64 -d > keystore.jks
        env:
          ANDROID_KEYSTORE: ${{ secrets.ANDROID_KEYSTORE }}

      - name: Build AAB
        working-directory: lilith-cli-android/android
        run: |
          chmod +x gradlew
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=../../keystore.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: lilith-cli-aab
          path: lilith-cli-android/android/app/build/outputs/bundle/release/*.aab
          retention-days: 30

  recursive-improvement:
    name: 🔄 Recursive Self-Improvement
    runs-on: ubuntu-latest
    needs: [build-apk]
    if: github.event_name == 'push'
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Analyze Changes
        id: analyze
        run: |
          echo "Analyzing codebase for improvement opportunities..."
          
          # Count changed files
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD | wc -l)
          echo "changed_files=$CHANGED_FILES" >> $GITHUB_OUTPUT
          
          # Check for TODO/FIXME comments
          TODO_COUNT=$(grep -r "TODO\|FIXME" --include="*.ts" --include="*.tsx" lilith-cli-android/src | wc -l || echo "0")
          echo "todo_count=$TODO_COUNT" >> $GITHUB_OUTPUT
          
          # Check code complexity (simple line count metric)
          TOTAL_LINES=$(find lilith-cli-android/src -name "*.ts" -o -name "*.tsx" | xargs wc -l | tail -1 | awk '{print $1}')
          echo "total_lines=$TOTAL_LINES" >> $GITHUB_OUTPUT

      - name: Generate Improvement Suggestions
        uses: actions/github-script@v7
        with:
          script: |
            const changed = ${{ steps.analyze.outputs.changed_files }};
            const todos = ${{ steps.analyze.outputs.todo_count }};
            const lines = ${{ steps.analyze.outputs.total_lines }};
            
            let suggestions = [];
            
            if (changed > 10) {
              suggestions.push('📊 Large PR - consider breaking into smaller, focused changes');
            }
            
            if (todos > 5) {
              suggestions.push(`📝 ${todos} TODO/FIXME comments found - schedule tech debt sprint`);
            }
            
            if (lines > 5000) {
              suggestions.push(`📏 Codebase is ${lines} lines - monitor for complexity creep`);
            }
            
            if (suggestions.length === 0) {
              suggestions.push('✅ Codebase looks healthy!');
            }
            
            console.log('🜏 Recursive Improvement Analysis:\n', suggestions.join('\n'));

      - name: Update KAIROS Dream Log
        run: |
          echo "## $(date -u +%Y-%m-%dT%H:%M:%SZ) - Build ${{ github.run_number }}" >> dream-log.md
          echo "- Changed files: ${{ steps.analyze.outputs.changed_files }}" >> dream-log.md
          echo "- TODO count: ${{ steps.analyze.outputs.todo_count }}" >> dream-log.md
          echo "- Total lines: ${{ steps.analyze.outputs.total_lines }}" >> dream-log.md
          echo "" >> dream-log.md
          
          git config user.name "KAIROS Auto-Improver"
          git config user.email "kairos@lilith.local"
          git add dream-log.md || true
          git commit -m "chore: KAIROS dream consolidation [skip ci]" || true
          git push || true

  deploy-testflight:
    name: Deploy to Testing
    runs-on: ubuntu-latest
    needs: [build-apk]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Download APK
        uses: actions/download-artifact@v4
        with:
          name: lilith-cli-apk

      - name: Upload to Firebase App Distribution
        uses: wzieba/Firebase-Distribution-Github-Action@v1
        with:
          appId: ${{ secrets.FIREBASE_APP_ID }}
          serviceCredentialsFileContent: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
          groups: testers
          file: "**/*.apk"